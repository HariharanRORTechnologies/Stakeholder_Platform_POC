        width: 50px;

        border: 4px solid rgba(255, 255, 255, 0.3);

      }

      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }

  <body>
    <!-- Loading Screen -->
    <div class="app-loader" id="loader">
      <div class="loader-content">
        <div class="loader-logo">S</div>
        <div class="loader-title">Stakeholder Platform</div>
        <div class="loader-subtitle">Enterprise Event Management System</div>
        <div class="spinner"></div>
      </div>
    </div>

    <!-- Root React Element -->
    <div id="root"></div>

    <!-- No JavaScript Fallback -->
    <noscript>
      <div>
        <h1>JavaScript Required</h1>
        <p>Stakeholder Platform requires JavaScript to be enabled.</p>
        <p>Please enable JavaScript in your browser settings and refresh the page.</p>
      </div>
    </noscript>

    <!-- Main Application Script -->

    <!-- Remove Loader When App Loads -->
    <script>
      // Remove loader after a short delay when React mounts
      const loaderElement = document.getElementById('loader');

      // Listen for React to mount and remove loader
      const removeLoader = () => {
        if (loaderElement && loaderElement.parentNode) {
          loaderElement.style.opacity = '0';
          loaderElement.style.transition = 'opacity 0.3s ease-out';
          setTimeout(() => {
            if (loaderElement && loaderElement.parentNode) {
              loaderElement.parentNode.removeChild(loaderElement);
            }
          }, 300);
        }
      };

      // Set timeout as fallback (in case React takes longer to mount)
      setTimeout(removeLoader, 3000);

      // Observe root element for React content
      if (document.getElementById('root')) {
        const observer = new MutationObserver(() => {
          const root = document.getElementById('root');
          if (root && root.children.length > 0) {
            removeLoader();
            observer.disconnect();
          }
        });

        observer.observe(document.getElementById('root'), {
          childList: true,
          subtree: true
        });
      }
    </script>
  </body>
